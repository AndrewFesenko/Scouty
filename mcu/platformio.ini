# PlatformIO Configuration
# For Arduino, ESP32, and STM32 development

[env:arduino_uno]
platform = atmelavr
board = uno
framework = arduino

[env:arduino_mega]
platform = atmelavr
board = megaatmega2560
framework = arduino

[env:esp32]
platform = espressif32
board = esp32dev
framework = arduino

[env:stm32]
platform = ststm32
board = nucleo_f103rb
framework = arduino
